name: Monthly project

# Generates one LLM-authored demo, deploys it to Cloud Run, screenshots it,
# and opens a PR adding it to the portfolio. Nothing reaches the live resume
# until the PR is merged.

on:
  schedule:
    # 07:00 UTC on the 1st of every month
    - cron: '0 7 1 * *'
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write
  pull-requests: write
  id-token: write # for Google Workload Identity Federation

concurrency:
  group: monthly-project
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install generator dependencies
        working-directory: scripts/generate-project
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Compute run date
        id: date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate, deploy, and screenshot the project
        working-directory: scripts/generate-project
        env:
          # Max-subscription token from `claude setup-token` — usage draws from
          # the Max plan, not per-token API billing. NOT an ANTHROPIC_API_KEY
          # (which would override it and bill per token — keep it unset).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GCP_PROJECT: ${{ vars.GCP_PROJECT || 'leebot-dev' }}
          GCP_REGION: ${{ vars.GCP_REGION || 'europe-west2' }}
          RUN_DATE: ${{ steps.date.outputs.value }}
        run: npm run generate

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/monthly-project-${{ steps.date.outputs.value }}
          title: 'Add monthly project (${{ steps.date.outputs.value }})'
          commit-message: 'Add monthly generated project (${{ steps.date.outputs.value }})'
          body: |
            Automated monthly project generated by Claude and deployed to Cloud Run.

            - Review the live demo linked in `src/data/generatedProjects.json`.
            - Check the generated source under `generated-projects/` — each portfolio card links to it via a "Code" button.
            - The Cloud Run service runs lean (128Mi / 0.5 vCPU, scale-to-zero, max 1 instance) so an idle demo costs nothing.
            - Merge to publish it on the portfolio (Vercel will redeploy).
          add-paths: |
            src/data/generatedProjects.json
            src/data/generatedProjects.ts
            src/images/portfolio/generated-*.png
            generated-projects/**
